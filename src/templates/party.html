<style>
  /* --- CORE VARIABLES & THEMING --- */
  #uie-party-window {
    --bg-base: rgba(10, 12, 16, 0.85);
    --bg-panel: rgba(255, 255, 255, 0.03);
    --bg-panel-hover: rgba(255, 255, 255, 0.07);
    --border-color: rgba(255, 255, 255, 0.08);
    --accent-gold: #cba35c;
    --accent-gold-glow: rgba(203, 163, 92, 0.3);
    --accent-cyan: #00e5ff;
    --text-main: #f0f0f0;
    --text-muted: #8a8a9e;
    --danger: #ff3366;
    
    position: fixed;
    top: 0;
    left: 0;
    right: auto;
    bottom: auto;
    transform: none;
    isolation: isolate;
    width: 100vw;
    height: 100vh;
    max-height: none;
    max-width: none;
    background: var(--bg-base); 
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-color);
    border-radius: 0;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
    display: flex; 
    flex-direction: column;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text-main);
    overflow: hidden;
  }

  /* --- SCROLLBARS --- */
  #uie-party-window *::-webkit-scrollbar { width: 6px; height: 6px; }
  #uie-party-window *::-webkit-scrollbar-track { background: transparent; }
  #uie-party-window *::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
  #uie-party-window *::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* --- HEADER & CONTROLS --- */
  #uie-party-window .uie-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
    border-bottom: 1px solid var(--border-color);
  }
  #uie-party-name { color: var(--text-main); font-weight: 700; font-size: 1.1em; }
  #uie-party-leader { color: var(--accent-gold); font-weight: 600; }
  .uie-controls i {
    color: var(--text-muted); font-size: 16px; transition: all 0.2s; padding: 6px; border-radius: 6px;
  }
  .uie-controls i:hover { color: var(--text-main); background: var(--bg-panel-hover); }

  /* --- NAVIGATION TABS --- */
  #uie-party-tabs {
    display: flex; gap: 4px; padding: 12px 16px 0;
    border-bottom: 1px solid var(--border-color);
    overflow-x: auto; scrollbar-width: none;
  }
  .uie-party-tab {
    flex: 1; min-width: 80px; padding: 10px 14px;
    background: transparent !important;
    border: none !important;
    border-bottom: 2px solid transparent !important;
    color: var(--text-muted) !important;
    font-size: 0.85em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    cursor: pointer; transition: all 0.2s;
    border-radius: 8px 8px 0 0 !important;
  }
  .uie-party-tab:hover { color: var(--text-main) !important; background: var(--bg-panel) !important; }
  /* Override JS inline styles for active tab */
  .uie-party-tab[style*="rgba(241,196,15"] {
    color: var(--accent-gold) !important;
    border-bottom: 2px solid var(--accent-gold) !important;
    background: linear-gradient(0deg, var(--accent-gold-glow) 0%, transparent 100%) !important;
  }

  /* --- BODY & COMMON ELEMENTS --- */
  #uie-party-body { flex: 1; overflow-y: auto; padding: 20px; }
  
  #uie-party-window input,
  #uie-party-window select,
  #uie-party-window textarea,
  #uie-party-window button,
  #uie-party-member-modal input,
  #uie-party-member-modal select,
  #uie-party-member-modal textarea,
  #uie-party-member-modal button {
    font-family: inherit; border-radius: 8px !important; transition: all 0.2s; outline: none;
  }
  #uie-party-window input[type="text"],
  #uie-party-window input[type="number"],
  #uie-party-window select,
  #uie-party-window textarea,
  #uie-party-member-modal input[type="text"],
  #uie-party-member-modal input[type="number"],
  #uie-party-member-modal select,
  #uie-party-member-modal textarea {

  #uie-party-window input:focus,
  #uie-party-window select:focus,
  #uie-party-window textarea:focus,
  #uie-party-member-modal input:focus,

  #uie-party-member-modal textarea:focus { border-color: var(--accent-gold) !important; box-shadow: 0 0 0 2px var(--accent-gold-glow); }

  /* Standard Buttons */

  #uie-party-member-modal button:not(.party-mm-tab):not(.party-mini):not(.form-mv) {

  #uie-party-window button:not(.uie-party-tab):hover,
  #uie-party-member-modal button:not(.party-mm-tab):hover { background: var(--bg-panel-hover) !important; transform: translateY(-1px); }

  /* --- ROSTER CARDS --- */
  .party-row {
    background: var(--bg-panel) !important; border: 1px solid var(--border-color) !important;
    border-radius: 12px !important; padding: 12px !important; margin-bottom: 10px;
    transition: all 0.2s ease;
  }

  .party-row.active { border-color: var(--accent-gold) !important; box-shadow: 0 0 15px var(--accent-gold-glow); }

    background: #000 !important; border: 1px solid rgba(255,255,255,0.1);

  .party-mini:hover { color: var(--text-main); background: rgba(255,255,255,0.1) !important; }

  /* --- STATS & VITALS --- */
  .stats-grid > div {
    background: rgba(0,0,0,0.2) !important; border: 1px solid rgba(255,255,255,0.05) !important;
    border-radius: 8px !important; padding: 8px 12px !important;
  }

  .party-tracker-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .party-tracker-title {
    font-size: 0.78em;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 900;
  }
  .party-member-trackers {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 8px;
    margin-bottom: 18px;
  }
  .party-tracker-card {
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(0,0,0,0.24);
    border-radius: 12px;
    padding: 8px;
  }
  .party-tracker-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .party-tracker-name {
    font-size: 0.85em;
    font-weight: 900;
    color: var(--text-main);
    max-width: 115px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .party-tracker-dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.18);
    flex: 0 0 auto;
  }
  .party-tracker-meta {
    font-size: 0.75em;
    color: rgba(255,255,255,0.78);
    font-weight: 800;
    font-family: monospace;
  }
  .party-tracker-bar {
    height: 8px;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .party-tracker-fill {
    height: 100%;
    width: 0%;
    background: #89b4fa;
  }
  .party-tracker-notes {
    margin-top: 6px;
    font-size: 0.72em;
    color: rgba(255,255,255,0.65);
    font-weight: 700;
    line-height: 1.3;
    max-height: 44px;
    overflow: auto;
  }
  .party-tracker-controls {
    margin-top: 7px;
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }
  .party-tracker-controls button {
    padding: 5px 8px !important;
    min-width: 32px;
    font-size: 0.78em;
    font-weight: 900 !important;
  }

  #uie-party-tracker-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 2147483660;
    align-items: center;
    justify-content: center;
    padding: 14px;
  }
  #uie-party-tracker-modal .box {
    width: 100%;
    max-width: 460px;
    max-height: 88vh;
    overflow: auto;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(20,18,28,.96);
    padding: 12px;
  }
  #uie-party-tracker-modal input[type="text"],
  #uie-party-tracker-modal input[type="number"],
  #uie-party-tracker-modal textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.03);
    color: #f6e7c8;
    outline: none;
  }
  #uie-party-tracker-modal textarea { resize: none; height: 110px; }
  #uie-party-tracker-modal .grid { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  #uie-party-tracker-modal .row { display: flex; gap: 10px; margin-top: 10px; }
  #uie-party-tracker-modal .row button { flex: 1; }
  #uie-party-tracker-modal .danger { border-color: rgba(243,139,168,.35)!important; color: #f38ba8!important; }
  #uie-party-tracker-modal .colorwrap { display: flex; align-items: center; gap: 10px; }
  #uie-party-tracker-modal input[type="color"] { width: 44px; height: 44px; border-radius: 12px; border: 1px solid rgba(255,255,255,.10); background: transparent; padding: 0; }

  /* --- GEAR SLOTS --- */
  .gear-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px !important; }
  .party-slot {
    background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(0,0,0,0.2)) !important;

  }
  .party-slot:hover { border-color: var(--accent-cyan) !important; box-shadow: inset 0 0 15px rgba(0,229,255,0.1); }

  /* --- MEMBER EQUIP PAPER DOLL --- */
  .party-mm-equip-layout {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: flex-start;
  }
  .party-paperdoll-pane {
    flex: 0 1 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: flex-start;
    max-width: 100%;
  }
  #party-paperdoll-pick.party-paperdoll-pick {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: auto;
    height: auto;
    min-height: 0;
    min-width: 0;
    max-width: min(100%, 70vw);
    max-height: 72vh;
    padding: 6px;
    border-radius: 16px;
    border: 2px dashed rgba(255,255,255,0.15);
    overflow: hidden;
    background: rgba(0,0,0,0.2);
    transition: all 0.2s;
  }
  #party-paperdoll-pick.party-paperdoll-pick.has-image {
    border-style: solid;
  }
  #party-paperdoll-pick .party-paperdoll-img {
    display: block;
    width: auto;
    height: auto;
    max-width: 100%;
    max-height: calc(72vh - 12px);
    object-fit: contain;
    object-position: center;
    border-radius: 12px;
    background: rgba(0,0,0,0.1);
  }
  #party-paperdoll-pick .party-paperdoll-empty {
    padding: 16px 14px;
    opacity: 0.75;
    font-weight: 900;
    color: rgba(255,255,255,0.78);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  /* --- MODAL (MEMBER CARD) --- */
  #uie-party-member-modal { backdrop-filter: blur(8px); background: rgba(0,0,0,0.6) !important; }
  #uie-party-member-card {
    background: rgba(15, 12, 18, 0.95) !important; border: 1px solid rgba(255,255,255,0.1) !important;
    box-shadow: 0 25px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1) !important;
    border-radius: 20px !important;
  }
  .uie-party-member-header { border-bottom: 1px solid rgba(255,255,255,0.05) !important; padding: 20px !important; }

  /* --- MOBILE RESPONSIVENESS --- */
  @media (max-width: 700px), (pointer: coarse) {
    #uie-party-window {
      width: 100vw !important; height: 100vh !important; max-height: none !important; max-width: none !important;
      border-radius: 0 !important; top: 0 !important; left: 0 !important; transform: none !important;
    }
    #uie-party-member-card { border-radius: 0 !important; }
    #party-paperdoll-pick.party-paperdoll-pick {
      max-width: 100%;
      max-height: 56vh;
    }
    #party-paperdoll-pick .party-paperdoll-img {
      max-height: calc(56vh - 12px);
    }
  }
</style>
